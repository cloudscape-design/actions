# This workflow executes a full dry-run test, which means that all we build and test all @cloudscape-design packages in GitHub.
# This ensures that the changes in the current package do not cause any regressions for its consumers.
name: dry-run

on:
  pull_request:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  # Disable Husky in CI
  # https://typicode.github.io/husky/how-to.html#ci-server-and-docker
  HUSKY: 0

jobs:
  createBuildTree:
    name: Create build tree
    runs-on: ubuntu-latest
    steps:
      - uses: cloudscape-design/actions/.github/actions/create-build-tree@dry-run
        with:
          package: ${{ github.event.repository.full_name }}
  build:
    needs: createBuildTree
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{fromJson(needs.createBuildTree.outputs.matrix)}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4    
        
        # Download artifacts from dependencies
      - name: Download dependencies artifacts
        if: ${{ matrix.level > 0 }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ join(needs.createBuildTree.outputs.matrix.*.package, ',') }}
          path: ./artifacts

      - name: Build package
        uses: cloudscape-design/actions/.github/actions/build-package@main
        with:
          package: ${{ matrix.package }}
          # Add any additional inputs needed for your build action
          # Use artifacts from dependencies if necessary

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: ./path-to-built-artifacts  # Adjust the path to your artifacts
